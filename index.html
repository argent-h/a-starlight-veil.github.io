<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 캐릭터 보관소</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            line-height: 1.6; 
            padding: 0 20px;
        }
        h1 { text-align: center; color: #333; }
        .character-card { 
            border: 1px solid #ddd; 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 12px; 
            background-color: #f9f9f9;
        }
        .character-img { 
            max-width: 300px; 
            border-radius: 8px; 
            display: block; 
            margin-bottom: 15px; 
        }
    </style>
</head>
<body>

    <h1>✨ 캐릭터 보관소</h1>

    <div class="character-card">
        <h2>이름: 아델</h2>
        <img class="character-img" src="images/adel.png" alt="아델의 이미지">
        <p><strong>성별/나이:</strong> 여성 / 22세</p>
        <p><strong>설정 및 배경:</strong></p>
        <p>여기에 글자 수 제한 없이 아주 긴 캐릭터의 배경 설정과 이야기, 관계도, 성격 등을 자유롭게 작성하시면 됩니다. 용량 걱정 없이 방대한 텍스트를 입력할 수 있습니다.</p>
    </div>

</body>
</html>
